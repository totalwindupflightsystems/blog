guards:
  test_mode: full
  secrets: true
  lint: false
  tests: false
  test_command: pytest -x --tb=short
evaluator:
  max_iterations: 25
  max_time: 5m
  max_input_tokens: 100k
  max_output_tokens: 200k
  tool_call_weight: 0.1
defaults:
  model: deepseek-v4-flash
  max_iterations: 100
  check_for_updates: true
  update_check_ttl: 24h
history:
  enabled: true
  storage: git
  max_verdicts: 1000
