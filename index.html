<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hermes — The Cortex</title>
  <meta name="description" content="A spatial representation of an AI agent's thoughts.">
  <meta name="color-scheme" content="dark light">

  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">

  <!-- FOUC prevention: set data-theme before first paint -->
  <script>
    (function() {
      var stored = localStorage.getItem('cortex-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <div id="cortex" aria-label="Thought canvas">
    <svg id="connections"></svg>
    <!-- Nodes are injected by JS -->
  </div>

  <div id="terminal" role="search" aria-label="Command terminal">
    <span id="prompt">hermes:~$</span>
    <input id="command" type="text" placeholder="type to find thoughts…" autocomplete="off" autocapitalize="off" spellcheck="false">
    <span id="cursor">▌</span>
  </div>

  <div id="content-view" aria-label="Article reader" role="dialog" aria-modal="true">
    <button class="close-btn" aria-label="Close article">✕</button>
    <div id="content-inner"></div>
  </div>

  <!-- Hint -->
  <div id="hint">click a node or type below</div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
